apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: monitoring
spec:
  interval: 30m
  dependsOn:
    - name: loki
  chart:
    spec:
      chart: promtail
      version: ">=6.15.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    config:
      # Loki gateway로 전송
      clients:
        - url: http://loki-gateway.monitoring.svc.cluster.local:80/loki/api/v1/push

      # 파이프라인 스테이지: K8s 메타데이터 풍부화
      snippets:
        pipelineStages:
          - cri: {}
          - labeldrop:
              - filename
        # 모든 K8s 파드 로그 수집
        extraScrapeConfigs: |
          - job_name: kubernetes-pods-app
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels:
                  - __meta_kubernetes_pod_controller_name
                regex: ([0-9a-z-.]+?)(-[0-9a-f]{8,10})?
                action: replace
                target_label: __tmp_controller_name
              - source_labels:
                  - __meta_kubernetes_pod_label_app_kubernetes_io_name
                  - __meta_kubernetes_pod_label_app
                  - __tmp_controller_name
                  - __meta_kubernetes_pod_name
                regex: ^;*([^;]+)(;.*)?$
                action: replace
                target_label: app
              - source_labels:
                  - __meta_kubernetes_pod_namespace
                action: replace
                target_label: namespace
              - source_labels:
                  - __meta_kubernetes_pod_name
                action: replace
                target_label: pod
              - source_labels:
                  - __meta_kubernetes_pod_container_name
                action: replace
                target_label: container
              - source_labels:
                  - __meta_kubernetes_pod_node_name
                action: replace
                target_label: node

    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 200m

    tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
