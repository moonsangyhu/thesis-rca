apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=65.0.0 <66.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 12h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    # AlertManager: 논문 실험에 불필요
    alertmanager:
      enabled: false

    # Prometheus 설정
    prometheus:
      prometheusSpec:
        retention: 30d
        retentionSize: "20GB"
        # 모든 namespace의 ServiceMonitor/PodMonitor 수집
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 2Gi
            cpu: 1000m
        # 실험 로그 보존을 위한 추가 외부 라벨
        externalLabels:
          cluster: thesis-rca
          environment: experiment

    # Grafana 설정
    grafana:
      enabled: true
      adminPassword: "thesis-rca-2024"
      persistence:
        enabled: true
        size: 5Gi
      # Loki 데이터소스 자동 추가
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki-gateway.monitoring.svc.cluster.local:80
          access: proxy
          isDefault: false
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
      # 기본 대시보드 프로비저닝
      defaultDashboardsEnabled: true
      defaultDashboardsTimezone: Asia/Seoul

    # Node Exporter
    nodeExporter:
      enabled: true
    prometheus-node-exporter:
      resources:
        requests:
          memory: 32Mi
          cpu: 50m
        limits:
          memory: 64Mi
          cpu: 100m

    # kube-state-metrics
    kubeStateMetrics:
      enabled: true
    kube-state-metrics:
      resources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 256Mi
          cpu: 200m

    # Prometheus Operator
    prometheusOperator:
      resources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 256Mi
          cpu: 200m
