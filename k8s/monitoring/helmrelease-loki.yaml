apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: loki
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # 6노드 lab 환경에 맞게 SingleBinary 모드 사용
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 20Gi
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 1Gi
          cpu: 500m

    # 불필요한 컴포넌트 비활성화 (SingleBinary 모드에서)
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0

    # Gateway (nginx) - Grafana에서 접근용
    gateway:
      enabled: true
      replicas: 1
      resources:
        requests:
          memory: 32Mi
          cpu: 50m
        limits:
          memory: 128Mi
          cpu: 100m

    # Loki canary 비활성화 (실험 환경 노이즈 최소화)
    lokiCanary:
      enabled: false

    # 테스트 파드 비활성화
    test:
      enabled: false

    # Lab 환경 메모리 절약: memcached 캐시 비활성화
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
