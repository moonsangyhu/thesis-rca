apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argocd
  namespace: argocd
spec:
  interval: 30m
  chart:
    spec:
      chart: argo-cd
      version: ">=7.0.0 <8.0.0"
      sourceRef:
        kind: HelmRepository
        name: argocd
        namespace: argocd
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    # 논문 실험용 ArgoCD 설정 (듀얼 GitOps: FluxCD + ArgoCD)
    global:
      domain: argocd.thesis-rca.local

    configs:
      params:
        # HTTP 허용 (lab 환경, TLS 없음)
        server.insecure: "true"
      secret:
        # admin 초기 비밀번호
        argocdServerAdminPassword: "$2a$10$ClUoMVAygvBGWZ35fzKt/eqweNp7HElg8Fnb3M6QuOh4FFJu1cspy"
        # bcrypt hash of "thesis-rca-2024"

    server:
      replicas: 1
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
      # NodePort로 외부 접근
      service:
        type: NodePort
        nodePortHttp: 30080
        nodePortHttps: 30443

    repoServer:
      replicas: 1
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m

    applicationSet:
      replicas: 1
      resources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 256Mi
          cpu: 200m

    notifications:
      enabled: false

    dex:
      enabled: false

    redis:
      resources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 256Mi
          cpu: 200m

    controller:
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 1Gi
          cpu: 1000m
