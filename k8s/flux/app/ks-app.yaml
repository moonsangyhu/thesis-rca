apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./k8s/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infrastructure
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: frontend
      namespace: boutique
    - apiVersion: apps/v1
      kind: Deployment
      name: cartservice
      namespace: boutique
    - apiVersion: apps/v1
      kind: Deployment
      name: checkoutservice
      namespace: boutique
